[phases.setup]
# poppler_utils -> requerido por pdf2image (pdftoppm/pdfinfo)
# tesseract -> auto-orientación del soporte (Tesseract OSD)
nixPkgs = ['python311', 'pip', 'poppler_utils', 'tesseract']

[phases.install]
cmds = ['pip install --upgrade pip', 'pip install -r requirements.txt']

[phases.build]
cmds = []

[start]
cmd = 'uvicorn app.main:app --host 0.0.0.0 --port $PORT'